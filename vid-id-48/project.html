<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookMyShow</title>
    <link rel="stylesheet" href="./s3.css" />
  </head>
  <body>
    <!-- header -->
    <header>
      <div class="head">
        <!-- 1. logo -->
        <div class="logo">
            <div class="left">
                <h1>BookMyShow</h1>
            </div>
            <div class="right">
                <button>movies</button>
                <button>events</button>
                <button>sports</button>
                <button>more</button>
            </div>
        </div>
        <!-- 2. search -->
        <div class="search">
            <input type="text" class="searching" placeholder="search for movies events or sports...">
            <button>Search</button>
        </div>
      </div>
    </header>

    <!-- main -->
     <main>
        <div class="first">
            <img src="./bookmyshow.avif" alt="">
            <button>Book Now</button>
        </div>
        <div class="mover">
            <h2>Popular Movies</h2>
        </div>
     </main>
  </body>
</html>

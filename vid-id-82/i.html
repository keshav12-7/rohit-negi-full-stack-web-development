<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AstroGuide ✨</title>
    <link rel="stylesheet" href="c.css" />
  </head>
  <body>
    <div class="container">
      <h1>AstroGuide 🔮</h1>
      <p>Enter your details to know your Zodiac Sign</p>
      <form id="astroform">
        <input type="text" id="fname" placeholder="First Name" />
        <input type="text" id="lname" placeholder="Last Name" />
        <input type="number" id="date" placeholder="Date (1-31)" />
        <input type="number" id="month" placeholder="Month (1-12)" />
        <input type="number" id="year" placeholder="Year" />
      </form>
      <button>Reveal Astrology</button>

      <div class="result" id="output"></div>
    </div>

    <script src="./s2.js"></script>
  </body>
</html>

<h2>feedback form</h2>
<form action="">
    <label for="">Your name</label>
    <input type="text">

    <br><br>

    <label for="">Your Email:</label>
    <input type="email">

    <br><br>

    <label >Rate us:</label>

    <input type="radio" name="rating" value="1 star" id="1">
    <label for="1">1 star</label>
    <input type="radio" name="rating" value="2 star" id="2">
    <label for="2">2 star</label>
    <input type="radio" name="rating" value="3 star" id="3">
    <label for="3">3 star</label>
    <input type="radio" name="rating" value="4 star" id="4">
    <label for="4">4 star</label>
    <input type="radio" name="rating" value="5 star" id="5">
    <label for="5">5 star</label>

    <br><br>

    <label for="Comments">Comments:</label>
    <textarea name="" id="Comments" rows="6" cols="23"></textarea>

    <br><br>

    <button>submit feedback</button>
</form>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zomato</title>
    <link rel="stylesheet" href="./c.css" />
  </head>
  <body>
    <div id="head">
      <button id="filters">filters</button>
      <button id="offers">offers</button>
      <button id="rating">rating 4.5+</button>
      <button id="alcohol">alcohol served</button>
      <button id="open">open now</button>
    </div>

    <!-- filter option popup -->
    
      <div id="filterpopup" class="hidden">
        <h3>choose filter</h3>
        <div class="filteroption">
          <input
            type="radio"
            id="sortbyrating"
            name="filteroption"
            value="rating"
          />
          <label for="sortbyrating">sort by rating</label>
        </div>
        <div class="filteroption">
          <input
            type="radio"
            id="sorthightolow"
            name="filteroption"
            value="hightolow"
          />
          <label for="sorthightolow">high to low(price)</label>
        </div>

        <div class="filteroption">
          <input
            type="radio"
            id="costlowtohigh"
            name="filteroption"
            value="lowtohigh"
          />
          <label for="costlowtohigh">cost: low to high</label>
        </div>

        <div class="filteroption">
          <input
            type="radio"
            name="filteroption"
            value="distance"
            id="distance"
          />
          <label for="distance">Distance</label>
        </div>

        <div class="btns">
          <button id="applyfilter">apply</button>
          <button id="closefilter">close</button>
        </div>
      </div>
    

    <!-- insert all the cards here -->

    <div id="root"></div>
    <script src="./s.js"></script>
  </body>
</html>

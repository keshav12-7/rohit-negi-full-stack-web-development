<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <link rel="stylesheet" href="./c.css">

<body>
    <div class="container">
        <h1>Cricket Quiz</h1>
        <form id="quizform" action="">
            <p>1. who has the
            most centuries in international ODI cricket</p>
            <label for="">
                <input type="radio" name="question1" value="Sachin Tendulkar">
                Sachin Tendulkar
            </label>
            <br>
            <label for="">
                <input type="radio" name="question1" value="Virat Kohli">
                Virat Kohli
            </label>
            <br>
            <label for="">
                <input type="radio" name="question1" value="rohit sharma">
                rohit sharma
            </label>
            

            <p>2. which country won the 1983 world cup</p>
            <label for="">
                <input type="radio" name="question2" value="England">
                England
            </label>
            <br>
            <label for="">
                <input type="radio" name="question2" value="kenya">
                kenya
            </label>
            <br>
            <label for="">
                <input type="radio" name="question2" value="INDIA">
                INDIA
            </label>
            

            <p>3. which cricket ground is known as home of cricket</p>
            <label for="">
                <input type="radio" name="question3" value="Lord's">
                Lord's
            </label>
            <br>
            <label for="">
                <input type="radio" name="question3" value="Eden Garden">
                Eden Garden
            </label>
            <br>
            <label for="">
                <input type="radio" name="question3" value="Oval">
                Oval
            </label>
            

            <p>4. what is the highest individual score in odi cricket</p>
            <label for="">
                <input type="radio" name="question4" value="400">
                400
            </label>
            <br>
            <label for="">
                <input type="radio" name="question4" value="264">
                264
            </label>
            <br>
            <label for="">
                <input type="radio" name="question4" value="312">
                312
            </label>
            <br>

            <button type="submit">Submit</button>
        </form>
        <div id="result"></div>
        
    </div>
    <script src="./s.js"></script>
</body>
</html>

<h2>IIT JEE Registration form</h2>

<form action="">
    <fieldset>
        <legend>IIT JEE Registration form</legend>
  <label for="fname">Full Name:</label>
  <input type="text" id="fname" name="fname" />

  <br /><br />

  <label for="email">Email:</label>
  <input type="email" id="email" name="mail"/>

  <br /><br />
  
  <label for="phone">phone:</label>
  <input type="tel" id="phone" name="phn_no." />
  
  <br /><br />
  <label for="pswd">password:</label>
  <input type="password" id="pswd" name="password" />
  <br /><br />

  <label>Gender:</label>

  <input type="radio" name="gender" id="male" value="male">
  <label for="male">Male</label>

  <input type="radio" name="gender" id="Female" value="female">
  <label for="female">female</label>

  <input type="radio" name="gender" id="others" value="others">
  <label for="others">others</label>
  <br><br>

  <label for="dob">Date of Birth:</label>
  <input type="date" name="dob" id="dob" min="2001-01-01" max="2007-12-31">
   <br><br>

   <label for="school_name">School Name:</label>
  <input type="text" id="school_name" name="school_name" />

  <br /><br />

  <label for="board">Board:</label>
  <select name="board" id="board" required>
    <option value=""   disabled selected>select your board</option>
    <option value="cbse">CBSE</option>
    <option value="icsc">ICSC</option>
    <option value="up">UP</option>
  </select>
   <br><br>

   <label for="Year_of_Passing">Year_of_Passing:</label>
  <input type="number" id="Year_of_Passing" name="Year_of_Passing"  min="2023" max="2025"/>

  <br><br>

  <label for="center">Exam-Center:</label>
  <select name="center" id="center" required>
    <option value="" disabled selected>select center</option>
    <option value="delhi">delhi</option>
    <option value="mumbai">mumbai</option>
    <option value="chennai">chennai</option>
    <option value="kolkata">kolkata</option>
  </select>
  <br><br>

  <button type="submit">Submit</button>
   </fieldset>
</form>

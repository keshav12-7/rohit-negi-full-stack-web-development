<h2>Employee Details Form </h2>
<form action="">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="fname" placeholder="Enter Your Full name">
    <br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="example@gmail.com">
    <br><br>
    <label for="phn">Phone Number:</label>
    <input type="tel" name="phone" id="phn" placeholder="enter your phone number">

    <br><br>

    <label >Gender:</label>
    <input type="radio" id="male" name="gender" value="male">

    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>

    <input type="radio" id="others" name="gender" value="others" >
    <label for="ohers">Others</label>

    <br><br>
    <label for="jt">Job Title:</label>
    <input type="text" name="job_title" id="jt" placeholder="Enter Your Job Title">

    <br><br>

    <label for="department">Department:</label>
    <select name="dept" id="department" required>
        <option value="" disabled selected>select your dept</option>
        <option value="engg">Engineer</option>
        <option value="finance">finance</option>
        <option value="rest">rest</option>
        <option value="med">medical</option>
    </select>
    <br><br>
    <button>submit</button>



</form>

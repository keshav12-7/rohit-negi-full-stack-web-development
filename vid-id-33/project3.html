<h2>Health Details Form</h2>

<form action="">
    <fieldset>
        <legend>personal Information</legend>
        <label for="fname">Full Name:</label>
        <input type="text" id="fname" name="name">
<br> <br>
        <label for="date-of-birth">date-of-birth:</label>
        <input type="date" id="date-of-birth" name="date-of-birth">
<br><br>
        <label for="gender">Gender:</label>
        <select name="gender" id="gender">
            <option value="" selected disabled>select your gender</option>
            <option value="male">M</option>
            <option value="female">F</option>
            <option value="others">others</option>
        </select>
        <br><br>
        <label for="phone-number">phone-number:</label>
        <input type="tel" name="phone-number" id="phone-number">

    </fieldset>

    <fieldset>
        <legend>Medical History</legend>

        <label for="Blood Group">Blood Group:</label>
        <select name="blood group" id="Blood Group">
            <option value="" disabled selected>blood group</option>
            <option value="">A+</option>
            <option value="">B+</option>
            <option value="">AB+</option>
            <option value="">AB-</option>

        </select>
        <br><br>
        <label>Do you wear glasses or contact lenses?</label>
        <br>
        <input type="radio" name="option" id="yes" value="yes"> 
        <label for="yes">Yes</label>
        <br>
        <input type="radio" name="option" id="no" value="no"> 
        <label for="no">No</label>
        <br><br>

        <label for="conditions-desc">pre-existing conditions:</label>
        <br>
        <textarea name="conditions-desc" id="conditions-desc" rows="6" cols="20" placeholder="List any pre-existing medical conditions"></textarea>
        
        
    </fieldset>
    <button type="submit">submit</button>
</form>
